<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e3a5f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="SAAZ Management">
<link rel="apple-touch-icon" href="icon-192.png">
<title>SAAZ Management</title>
<meta name="version" content="v4.1">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',sans-serif;background:#0f172a;color:#f1f5f9;max-width:480px;margin:0 auto;min-height:100vh}
.hidden{display:none!important}
#loginPage{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.login-logo{font-size:48px;margin-bottom:8px}
.login-brand{font-size:11px;color:#60a5fa;letter-spacing:3px;font-weight:700;text-transform:uppercase;margin-bottom:4px}
.login-title{font-size:24px;font-weight:800;margin-bottom:32px;color:#fff}
.login-card{background:#1e293b;border-radius:16px;padding:24px;width:100%;max-width:360px}
.login-card h3{font-size:16px;margin-bottom:20px;color:#e2e8f0}
.field{margin-bottom:14px}
.field label{font-size:11px;color:#94a3b8;display:block;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:11px 14px;border-radius:10px;border:1px solid #334155;background:#0f172a;color:#f1f5f9;font-size:14px;font-family:inherit}
.field textarea{resize:vertical;min-height:70px}
.btn-primary{width:100%;padding:13px;border-radius:12px;border:none;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;font-weight:700;font-size:15px;cursor:pointer;margin-top:4px}
.btn-success{background:linear-gradient(135deg,#059669,#047857);color:#fff;border:none;padding:10px 18px;border-radius:10px;font-weight:700;cursor:pointer;font-size:13px}
.btn-danger{background:#dc2626;color:#fff;border:none;padding:8px 14px;border-radius:8px;font-weight:600;cursor:pointer;font-size:12px}
.btn-outline{background:transparent;color:#60a5fa;border:1px solid #334155;padding:8px 14px;border-radius:8px;font-weight:600;cursor:pointer;font-size:12px}
.btn-warning{background:#d97706;color:#fff;border:none;padding:8px 14px;border-radius:8px;font-weight:600;cursor:pointer;font-size:12px}
.btn-sm{padding:6px 12px;font-size:11px;border-radius:8px}
.header{background:linear-gradient(135deg,#1e3a5f,#0f172a);padding:14px 14px 0;border-bottom:1px solid #1e40af33;position:sticky;top:0;z-index:100}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.header-info{font-size:10px;color:#60a5fa;letter-spacing:2px;font-weight:700;text-transform:uppercase}
.header-name{font-size:17px;font-weight:800}
.header-role{font-size:11px;color:#94a3b8;margin-top:1px}
.logout-btn{background:#1e293b;border:none;color:#94a3b8;padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer}
.nav{display:flex;gap:4px;overflow-x:auto;padding-bottom:0}
.nav::-webkit-scrollbar{display:none}
.nav-btn{flex:0 0 auto;padding:8px 12px;border-radius:10px 10px 0 0;border:none;background:transparent;color:#94a3b8;font-weight:600;font-size:11px;cursor:pointer;white-space:nowrap}
.nav-btn.active{background:#0f172a;color:#60a5fa;border-bottom:2px solid #2563eb}
.page{padding:14px;padding-bottom:80px;display:none}
.page.active{display:block}
.page-title{font-size:16px;font-weight:800;margin-bottom:14px;color:#e2e8f0}
.card{background:#1e293b;border-radius:12px;padding:14px;margin-bottom:10px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{background:#1e293b;border-radius:12px;padding:14px}
.stat-icon{font-size:13px;color:#94a3b8;margin-bottom:4px}
.stat-val{font-size:26px;font-weight:800}
.stat-label{font-size:10px;color:#94a3b8;margin-top:2px}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.badge-open{background:#7f1d1d;color:#fca5a5}
.badge-inprogress{background:#78350f;color:#fcd34d}
.badge-resolved{background:#14532d;color:#86efac}
.badge-admin{background:#4c1d95;color:#c4b5fd}
.badge-manager{background:#1e3a5f;color:#93c5fd}
.badge-engineer{background:#14532d;color:#86efac}
.badge-warranty-ok{background:#14532d;color:#86efac}
.badge-warranty-soon{background:#78350f;color:#fcd34d}
.badge-warranty-expired{background:#7f1d1d;color:#fca5a5}
.badge-paid{background:#14532d;color:#86efac}
.badge-pending{background:#78350f;color:#fcd34d}
.badge-overdue{background:#7f1d1d;color:#fca5a5}
.badge-today{background:#1e3a5f;color:#93c5fd}
.complaint-card{background:#1e293b;border-radius:12px;padding:14px;margin-bottom:10px;border-left:3px solid #334155;cursor:pointer}
.complaint-card.open{border-left-color:#ef4444}
.complaint-card.inprogress{border-left-color:#f59e0b}
.complaint-card.resolved{border-left-color:#22c55e}
.payment-card{background:#1e293b;border-radius:12px;padding:14px;margin-bottom:10px;border-left:3px solid #334155;cursor:pointer}
.payment-card.today{border-left-color:#f59e0b;background:#1c1a0f}
.payment-card.overdue{border-left-color:#ef4444;background:#1c0f0f}
.payment-card.paid{border-left-color:#22c55e}
.machine-card{background:#1e293b;border-radius:12px;padding:14px;margin-bottom:10px;border-left:3px solid #334155;cursor:pointer}
.machine-card.warranty-ok{border-left-color:#22c55e}
.machine-card.warranty-soon{border-left-color:#f59e0b}
.machine-card.warranty-expired{border-left-color:#ef4444}
.reminder-alert{background:#1c1a0f;border:1px solid #f59e0b;border-radius:12px;padding:14px;margin-bottom:14px;cursor:pointer}
.att-card{background:#1e293b;border-radius:12px;padding:16px;margin-bottom:14px;text-align:center}
.att-time{font-size:36px;font-weight:800;color:#60a5fa;margin:8px 0}
.att-label{font-size:12px;color:#94a3b8}
.att-btns{display:flex;gap:10px;justify-content:center;margin-top:14px}
.emp-card{background:#1e293b;border-radius:12px;padding:14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.toast{position:fixed;top:12px;left:50%;transform:translateX(-50%);color:#fff;padding:10px 20px;border-radius:30px;z-index:9999;font-weight:700;font-size:13px;display:none;white-space:nowrap;max-width:90vw;text-align:center}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:500;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:#1e293b;border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:800;margin-bottom:16px}
.modal-close{float:right;background:none;border:none;color:#94a3b8;font-size:20px;cursor:pointer;margin-top:-4px}
.loading{text-align:center;padding:40px;color:#64748b}
.divider{height:1px;background:#334155;margin:12px 0}
.text-muted{color:#64748b;font-size:12px}
.text-danger{color:#f87171}
.text-success{color:#4ade80}
.text-warning{color:#fbbf24}
.mt-8{margin-top:8px}
.flex-between{display:flex;justify-content:space-between;align-items:center}
.search-inp{width:100%;padding:10px 14px;border-radius:10px;border:1px solid #334155;background:#1e293b;color:#f1f5f9;font-size:14px;margin-bottom:12px}
.empty{text-align:center;padding:40px;color:#64748b;font-size:13px}
.warranty-bar{height:6px;border-radius:3px;background:#334155;margin-top:8px;overflow:hidden}
.warranty-fill{height:100%;border-radius:3px}
</style>
</head>
<body>
<div id="loginPage">
  <div class="login-logo">🏭</div>
  <div class="login-brand">SAAZ Electronic</div>
  <div class="login-title">Management System</div>
  <div class="login-card">
    <h3>Login Karo</h3>
    <div class="field"><label>Phone Number</label><input type="tel" id="loginPhone" placeholder="9999999999"></div>
    <div class="field"><label>Password</label><input type="password" id="loginPass" placeholder="Password"></div>
    <button class="btn-primary" onclick="doLogin()">Login</button>
    <div id="loginError" class="text-danger mt-8" style="font-size:13px;text-align:center"></div>
  </div>
</div>
<div id="mainApp" class="hidden">
  <div class="header">
    <div class="header-top">
      <div>
        <div class="header-info">SAAZ Electronic Varanasi</div>
        <div class="header-name" id="headerName">---</div>
        <div class="header-role" id="headerRole">---</div>
      </div>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
    <div class="nav" id="navBar"></div>
  </div>
  <div class="page" id="page-dashboard">
    <div class="page-title">Dashboard</div>
    <div id="todayReminderAlert"></div>
    <div class="stats-grid" id="dashStats"></div>
    <div class="page-title" style="font-size:14px">Warranty Expiring Soon</div>
    <div id="dashWarranty"></div>
    <div class="page-title" style="font-size:14px;margin-top:8px">Open Complaints</div>
    <div id="dashComplaints"></div>
  </div>
  <div class="page" id="page-complaints">
    <div class="flex-between" style="margin-bottom:14px">
      <div class="page-title" style="margin:0">Complaints</div>
      <div style="display:flex;gap:6px">
        <button class="btn-outline btn-sm" onclick="refreshPage('complaints')" title="Refresh">↻</button>
        <button class="btn-success btn-sm" onclick="openModal('addComplaint')" id="addComplaintBtn">+ Add</button>
      </div>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:12px;overflow-x:auto">
      <button class="btn-outline btn-sm" onclick="filterComplaints('all')" id="f-all" style="background:#334155;color:#fff">All</button>
      <button class="btn-outline btn-sm" onclick="filterComplaints('open')" id="f-open">Open</button>
      <button class="btn-outline btn-sm" onclick="filterComplaints('inprogress')" id="f-inprogress">In Progress</button>
      <button class="btn-outline btn-sm" onclick="filterComplaints('resolved')" id="f-resolved">Resolved</button>
    </div>
    <div id="complaintsList"></div>
  </div>
  <div class="page" id="page-payments">
    <div class="flex-between" style="margin-bottom:14px">
      <div class="page-title" style="margin:0">Payment Reminders</div>
      <div style="display:flex;gap:6px">
        <button class="btn-outline btn-sm" onclick="refreshPage('payments')" title="Refresh">↻</button>
        <button class="btn-success btn-sm" onclick="openModal('addPayment')">+ Add</button>
      </div>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:12px;overflow-x:auto">
      <button class="btn-outline btn-sm" onclick="filterPayments('all')" id="pf-all" style="background:#334155;color:#fff">All</button>
      <button class="btn-outline btn-sm" onclick="filterPayments('today')" id="pf-today">Aaj</button>
      <button class="btn-outline btn-sm" onclick="filterPayments('overdue')" id="pf-overdue">Overdue</button>
      <button class="btn-outline btn-sm" onclick="filterPayments('pending')" id="pf-pending">Pending</button>
    </div>
    <div style="position:relative;margin-bottom:12px">
      <input class="search-inp" id="paymentSearchInp" placeholder="Customer naam search karo..." oninput="searchPayments(this.value)" style="margin-bottom:0;padding-right:110px">
      <div id="paymentCount" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:11px;color:#475569;pointer-events:none"></div>
    </div>
    <div id="paymentsList"></div>
  </div>
  <div class="page" id="page-machines">
    <div class="flex-between" style="margin-bottom:14px">
      <div class="page-title" style="margin:0">Machines</div>
      <div style="display:flex;gap:6px">
        <button class="btn-outline btn-sm" onclick="refreshPage('machines')" title="Refresh">↻</button>
        <button class="btn-success btn-sm" onclick="openModal('addMachine')">+ Add</button>
      </div>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:12px;overflow-x:auto">
      <button class="btn-outline btn-sm" onclick="filterMachines('all')" id="mf-all" style="background:#334155;color:#fff">All</button>
      <button class="btn-outline btn-sm" onclick="filterMachines('ok')" id="mf-ok">Valid</button>
      <button class="btn-outline btn-sm" onclick="filterMachines('soon')" id="mf-soon">Expiring</button>
      <button class="btn-outline btn-sm" onclick="filterMachines('expired')" id="mf-expired">Expired</button>
    </div>
    <input class="search-inp" placeholder="Search naam, serial number..." oninput="searchMachines(this.value)">
    <div id="machinesList"></div>
  </div>
  <div class="page" id="page-attendance">
    <div class="page-title">Attendance</div>
    <div class="att-card">
      <div class="att-label">Aaj - <span id="attDate"></span></div>
      <div class="att-time" id="attClock">00:00:00</div>
      <div id="attStatus" class="text-muted">Loading...</div>
      <div class="att-btns">
        <button class="btn-success" id="btnCheckIn" onclick="doCheckIn()">Check In</button>
        <button class="btn-danger" id="btnCheckOut" onclick="doCheckOut()" style="display:none">Check Out</button>
      </div>
    </div>
    <div class="page-title" style="font-size:14px">History</div>
    <div id="attHistory"></div>
  </div>
  <div class="page" id="page-employees">
    <div class="flex-between" style="margin-bottom:14px">
      <div class="page-title" style="margin:0">Employees</div>
      <button class="btn-success btn-sm" onclick="openModal('addEmployee')">+ Add</button>
    </div>
    <input class="search-inp" placeholder="Search..." oninput="searchEmployees(this.value)">
    <div id="employeesList"></div>
  </div>
  <div class="page" id="page-customers">
    <div class="flex-between" style="margin-bottom:14px">
      <div class="page-title" style="margin:0">Customers</div>
      <div style="display:flex;gap:6px">
        <button class="btn-outline btn-sm" onclick="refreshPage('customers')" title="Refresh">↻</button>
        <button class="btn-success btn-sm" onclick="openModal('addCustomer')">+ Add</button>
      </div>
    </div>
    <div style="position:relative;margin-bottom:12px">
      <input class="search-inp" id="customerSearchInp" placeholder="Search naam, phone..." oninput="searchCustomers(this.value)" style="margin-bottom:0;padding-right:100px">
      <div id="customerCount" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:11px;color:#475569;pointer-events:none">0 customers</div>
    </div>
    <div id="customersList"></div>
  </div>
  <div class="page" id="page-location">
    <div class="page-title">Location</div>
    <div class="card">
      <div style="font-weight:700;margin-bottom:10px">Apni location share karo</div>
      <div id="locationStatus" class="text-muted" style="margin-bottom:12px;font-size:13px">--</div>
      <button class="btn-primary" onclick="shareLocation()">Location Share Karo</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalContent"></div>
</div>
<div class="toast" id="toast"></div>
<script>
var API='https://script.google.com/macros/s/AKfycbzmZ6xyh8oh_AIyta9OaTPASWCDc5XGjcaQqTqVMNmvnJ2WB2MTixkm-PSKTZ7IDMkrSQ/exec';
var currentUser=null;
var allComplaints=[],allEmployees=[],allCustomers=[],allMachines=[],allMachineTypes=[],allPayments=[];
var currentFilter='all',currentMachineFilter='all',currentPaymentFilter='all';
var clockInterval=null;
// Cache timestamps
var cacheTime={complaints:0,employees:0,customers:0,machines:0,payments:0,machineTypes:0};
var CACHE_MS=5*60*1000; // 5 minutes cache
function isCacheValid(key){return allComplaints.length>0&&(Date.now()-cacheTime[key])<CACHE_MS;}
function invalidateCache(key){if(key)cacheTime[key]=0;else Object.keys(cacheTime).forEach(function(k){cacheTime[k]=0;});}

async function api(params){
  var url=API+'?'+new URLSearchParams(params);
  try{var r=await fetch(url);return await r.json();}catch(e){return{success:false,error:'Network error'};}
}

function toast(msg,color){
  color=color||'#22c55e';
  var t=document.getElementById('toast');
  t.textContent=msg;t.style.background=color;t.style.display='block';
  setTimeout(function(){t.style.display='none';},3000);
}

function fmt(d){if(!d)return '--';return new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});}
function today(){return new Date().toISOString().split('T')[0];}
function daysFromToday(d){if(!d)return 999;return Math.floor((new Date(d)-new Date())/86400000);}

function warrantyStatus(expiry){
  if(!expiry)return 'expired';
  var days=daysFromToday(expiry);
  if(days<0)return 'expired';if(days<=30)return 'soon';return 'ok';
}

function warrantyLabel(expiry){
  if(!expiry)return 'Expired';
  var days=daysFromToday(expiry);
  if(days<0)return 'Expired ('+Math.abs(days)+'d ago)';
  if(days<=30)return days+' din mein expire';
  return days+' din baki';
}

function getPaymentStatus(p){
  if(p.status==='paid')return 'paid';
  var rd=p.reminderDate?daysFromToday(p.reminderDate):999;
  var pd=p.promiseDate?daysFromToday(p.promiseDate):999;
  var minDays=Math.min(rd,pd);
  if(minDays<0)return 'overdue';if(minDays===0)return 'today';return 'pending';
}

function dLabel(d){if(d===null)return '';if(d<0)return Math.abs(d)+'d overdue';if(d===0)return 'Aaj';return d+'d baad';}

async function doLogin(){
  var phone=document.getElementById('loginPhone').value.trim();
  var pass=document.getElementById('loginPass').value.trim();
  if(!phone||!pass){document.getElementById('loginError').textContent='Phone aur password daalo';return;}
  document.getElementById('loginError').textContent='Login ho raha hai...';
  var res=await api({action:'login',phone:phone,password:pass});
  if(res.success){currentUser=res.user;localStorage.setItem('saaz_user',JSON.stringify(currentUser));startApp();}
  else{document.getElementById('loginError').textContent=res.error||'Login failed';}
}

function logout(){
  if(!confirm('Logout karna hai?'))return;
  currentUser=null;localStorage.removeItem('saaz_user');clearInterval(clockInterval);
  document.getElementById('loginPage').classList.remove('hidden');
  document.getElementById('mainApp').classList.add('hidden');
  document.getElementById('loginPhone').value='';document.getElementById('loginPass').value='';
  document.getElementById('loginError').textContent='';
}

function startApp(){
  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('mainApp').classList.remove('hidden');
  document.getElementById('headerName').textContent=currentUser.name;
  document.getElementById('headerRole').textContent=currentUser.role==='admin'?'Admin':currentUser.role==='manager'?'Manager':'Engineer';
  buildNav();showPage(currentUser.role==='engineer'?'attendance':'dashboard');startClock();
}

function buildNav(){
  var role=currentUser.role;
  var tabs=role==='engineer'
    ?[{id:'attendance',label:'Attendance'},{id:'complaints',label:'Complaints'},{id:'location',label:'Location'}]
    :[{id:'dashboard',label:'Home'},{id:'complaints',label:'Complaints'},{id:'payments',label:'Payments'},{id:'machines',label:'Machines'},{id:'customers',label:'Customers'},{id:'employees',label:'Team'}];
  document.getElementById('navBar').innerHTML=tabs.map(function(t){return '<button class="nav-btn" id="nav-'+t.id+'" onclick="showPage(\''+t.id+'\')">'+t.label+'</button>';}).join('');
}

function showPage(id){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active');});
  var page=document.getElementById('page-'+id);var nav=document.getElementById('nav-'+id);
  if(page)page.classList.add('active');if(nav)nav.classList.add('active');loadPage(id);
}

async function loadPage(id){
  if(id==='dashboard')loadDashboard();
  else if(id==='complaints'){await ensureData();loadComplaints();}
  else if(id==='payments'){await ensureData();loadPayments();}
  else if(id==='machines')loadMachines();
  else if(id==='attendance')loadAttendance();
  else if(id==='employees')loadEmployees();
  else if(id==='customers'){
    var sinp=document.getElementById('customerSearchInp');
    if(sinp)sinp.value='';
    loadCustomers();
  }
}

async function ensureData(){
  if(!allEmployees.length){var r=await api({action:'getEmployees'});allEmployees=r.success?r.data:[];}
  if(!allCustomers.length){var r2=await api({action:'getCustomers'});allCustomers=r2.success?r2.data:[];}
}

function startClock(){
  clearInterval(clockInterval);
  var de=document.getElementById('attDate');
  if(de)de.textContent=new Date().toLocaleDateString('en-IN',{weekday:'short',day:'2-digit',month:'short'});
  clockInterval=setInterval(function(){var el=document.getElementById('attClock');if(el)el.textContent=new Date().toLocaleTimeString('en-IN');},1000);
}

async function loadDashboard(){
  document.getElementById('dashStats').innerHTML='<div class="loading">Loading...</div>';
  var cr=await api({action:'getComplaints'});
  var er=await api({action:'getEmployees'});
  var mr=await api({action:'getMachines'});
  var pr=await api({action:'getTodayReminders'});
  allComplaints=cr.success?cr.data:[];allEmployees=er.success?er.data:[];allMachines=mr.success?mr.data:[];
  var todayR=pr.success?pr.data:[];
  var alertEl=document.getElementById('todayReminderAlert');
  if(todayR.length>0){
    var rHTML='<div class="reminder-alert" onclick="showPage(\'payments\')"><div style="font-weight:800;font-size:15px;color:#fbbf24">'+todayR.length+' Payment Reminder Aaj!</div>';
    todayR.forEach(function(p){rHTML+='<div style="font-size:13px;margin-top:6px;color:#fcd34d">'+p.customerName+' - Rs.'+parseFloat(p.pendingAmount||0).toLocaleString()+' pending</div>';});
    rHTML+='<div style="font-size:11px;color:#94a3b8;margin-top:8px">Tap karke dekho</div></div>';
    alertEl.innerHTML=rHTML;
  }else{alertEl.innerHTML='';}

function sortPayments(list){
  var order={today:0,overdue:1,pending:2,paid:3};
  return list.slice().sort(function(a,b){
    var sa=order[getPaymentStatus(a)];var sb=order[getPaymentStatus(b)];
    if(sa!==sb)return sa-sb;
    // same status: sort by date ascending (jo pehle aa raha hai wo upar)
    var da=Math.min(a.reminderDate?daysFromToday(a.reminderDate):999,a.promiseDate?daysFromToday(a.promiseDate):999);
    var db=Math.min(b.reminderDate?daysFromToday(b.reminderDate):999,b.promiseDate?daysFromToday(b.promiseDate):999);
    return da-db;
  });
}

function filterPayments(f){
  currentPaymentFilter=f;
  document.querySelectorAll('[id^="pf-"]').forEach(function(b){b.style.background='transparent';b.style.color='#60a5fa';});
  var btn=document.getElementById('pf-'+f);if(btn){btn.style.background='#334155';btn.style.color='#fff';}
  // Clear search when filter changes
  var sinp=document.getElementById('paymentSearchInp');if(sinp)sinp.value='';
  var filtered=allPayments;
  if(f==='today')filtered=allPayments.filter(function(p){return getPaymentStatus(p)==='today';});
  else if(f==='overdue')filtered=allPayments.filter(function(p){return getPaymentStatus(p)==='overdue';});
  else if(f==='pending')filtered=allPayments.filter(function(p){return getPaymentStatus(p)==='pending';});
  renderPayments(sortPayments(filtered));
}

function searchPayments(q){
  var countEl=document.getElementById('paymentCount');
  if(!q||!q.trim()){
    if(countEl)countEl.textContent=allPayments.length+' records';
    renderPayments(sortPayments(allPayments));
    return;
  }
  var q2=q.trim().toLowerCase();
  var filtered=allPayments.filter(function(p){
    return (p.customerName&&p.customerName.toLowerCase().indexOf(q2)>-1)||
           (p.phone&&String(p.phone).indexOf(q)>-1);
  });
  if(countEl)countEl.textContent=filtered.length+' / '+allPayments.length+' records';
  renderPayments(sortPayments(filtered));
}

async function loadCustomers(force){
  if(!force&&cacheTime.customers&&(Date.now()-cacheTime.customers)<CACHE_MS&&allCustomers.length){
    var q=document.getElementById('customerSearchInp')?document.getElementById('customerSearchInp').value:'';
    if(q)searchCustomers(q);else renderCustomers(allCustomers,false);
    return;
  }
  document.getElementById('customersList').innerHTML='<div class="loading">Loading...</div>';
  var res=await api({action:'getCustomers'});
  if(res.success){allCustomers=res.data;cacheTime.customers=Date.now();}

function customerCardHTML(c){
  var pend=c.totalAmount?parseFloat(c.totalAmount)-parseFloat(c.paidAmount||0):null;
  return '<div class="card" style="border-left:3px solid '+(pend>0?'#ef4444':'#22c55e')+';cursor:pointer" onclick="openCustomerDetail(\''+c.id+'\')">'+
    '<div class="flex-between"><div><div style="font-weight:700">'+c.name+'</div><div class="text-muted">'+c.phone+' - '+(c.area||'--')+'</div>'+
    (pend>0?'<div class="text-danger" style="font-size:12px;margin-top:2px">Rs.'+parseFloat(pend).toLocaleString()+' pending</div>':'<div class="text-success" style="font-size:12px;margin-top:2px">Fully Paid</div>')+
    '</div><button class="btn-outline btn-sm" onclick="event.stopPropagation();openAddMachineForCustomer(\''+c.id+'\',\''+c.name+'\')">+Machine</button></div></div>';
}
function updateCustomerCount(shown,total){
  var el=document.getElementById('customerCount');
  if(!el)return;
  var q=document.getElementById('customerSearchInp')?document.getElementById('customerSearchInp').value.trim():'';
  if(!q||shown===total)el.textContent=total+' customers';
  else el.textContent=shown+' / '+total+' customers';
}
function renderCustomers(list,skipSort){
  var display=skipSort?list:list.slice().sort(function(a,b){return (a.name||'').localeCompare(b.name||'');});
  updateCustomerCount(display.length,allCustomers.length);
  document.getElementById('customersList').innerHTML=display.length===0
    ?'<div class="empty">Koi customer nahi</div>'
    :display.map(function(c){return customerCardHTML(c);}).join('');
}
function searchCustomers(q){
  var countEl=document.getElementById('customerCount');
  if(!q||!q.trim()){
    if(countEl)countEl.textContent=allCustomers.length+' customers';
    renderCustomers(allCustomers,false);
    return;
  }
  var q2=q.trim().toLowerCase();
  var sw=[],ct=[],pm=[];
  for(var i=0;i<allCustomers.length;i++){
    var c=allCustomers[i];
    var nm=(c.name||'').toLowerCase();
    var ph=String(c.phone||'');
    if(nm.startsWith(q2))sw.push(c);
    else if(nm.indexOf(q2)>-1)ct.push(c);
    else if(ph.indexOf(q)>-1)pm.push(c);
  }
  // Sort each group alphabetically within itself
  sw.sort(function(a,b){return (a.name||'').localeCompare(b.name||'');});
  ct.sort(function(a,b){return (a.name||'').localeCompare(b.name||'');});
  var result=sw.concat(ct).concat(pm);
  if(countEl)countEl.textContent=result.length+' / '+allCustomers.length+' customers';
  var el=document.getElementById('customersList');
  if(!result.length){el.innerHTML='<div class="empty">Koi customer nahi</div>';return;}
  // Render directly - NO sort - startsWith stays on top
  el.innerHTML=result.map(function(c){return customerCardHTML(c);}).join('');
}

function openAddMachineForCustomer(cid,cname){openModal('addMachine');setTimeout(function(){document.getElementById('am-customerId').value=cid;document.getElementById('am-custname').value=cname;},100);}

function closeModal(e){
  if(e&&e.target!==document.getElementById('modalOverlay'))return;
  document.getElementById('modalOverlay').classList.remove('active');
}

async function submitComplaint(){
  var name=document.getElementById('cc-name').value.trim();var title=document.getElementById('cc-title').value.trim();
  if(!name||!title){toast('Naam aur problem zaroori hai!','#ef4444');return;}
  var engVal=document.getElementById('cc-engineer').value;var engId='',engName='';
  if(engVal){var ep=engVal.split('|');engId=ep[0];engName=ep[1];}
  var mv=document.getElementById('cc-machine').value;var machineInfo='';
  if(mv){var mp=mv.split('|');machineInfo=mp[1]+' '+mp[2]+'H - S/N: '+mp[3];}
  var res=await api({action:'addComplaint',customerId:document.getElementById('cc-customerId').value,customerName:name,phone:document.getElementById('cc-phone').value,area:document.getElementById('cc-area').value,title:title,description:document.getElementById('cc-desc').value,priority:document.getElementById('cc-priority').value,assignedEngineerId:engId,assignedEngineerName:engName,notes:machineInfo?'Machine: '+machineInfo:''});
  if(res.success){toast('Complaint add ho gayi!');closeModal();invalidateCache('complaints');loadComplaints(true);}else toast('Error: '+res.error,'#ef4444');
}

async function submitPayment(){
  var cname=document.getElementById('ap-custname').value.trim();
  var total=document.getElementById('ap-total').value;
  var custId=document.getElementById('ap-customerId').value;
  if(!cname||!total){toast('Customer naam aur total amount zaroori hai!','#ef4444');return;}
  // Duplicate check - same customer ka pending entry already hai?
  var existing=allPayments.filter(function(p){
    return (custId&&String(p.customerId)===String(custId))||(p.customerName&&p.customerName.toLowerCase()===cname.toLowerCase());
  });
  if(existing.length>0){
    toast('Is customer ka payment reminder already hai! Pehle wala update karo.','#f59e0b');
    closeModal();
    // Highlight existing entry
    filterPayments('all');
    return;
  }
  var _pd=document.getElementById('ap-promdate').value;
  var res=await api({action:'addPayment',customerId:custId,customerName:cname,phone:document.getElementById('ap-phone').value,totalAmount:total,paidAmount:document.getElementById('ap-paid').value,promiseNote:document.getElementById('ap-promise').value,promiseDate:_pd,reminderDate:_pd});
  if(res.success){toast('Payment reminder add ho gaya!');closeModal();invalidateCache('payments');loadPayments(true);}else toast('Error: '+res.error,'#ef4444');
}

async function submitMachine(){
  var cname=document.getElementById('am-custname').value.trim();var serial=document.getElementById('am-serial').value.trim();var install=document.getElementById('am-install').value;
  if(!cname||!serial||!install){toast('Customer naam, serial number aur installation date zaroori hai!','#ef4444');return;}
  var res=await api({action:'addMachine',customerId:document.getElementById('am-customerId').value,customerName:cname,model:document.getElementById('am-model').value,hooks:document.getElementById('am-hooks').value,serialNumber:serial,installationDate:install,notes:document.getElementById('am-notes').value});
  if(res.success){toast('Machine add ho gayi! 1 saal warranty set ho gayi.');closeModal();invalidateCache('machines');loadMachines(true);}else toast('Error: '+res.error,'#ef4444');
}

  if(res.success){toast('History save ho gayi!');closeModal();invalidateCache('complaints');}
  else toast('Error: '+res.error,'#ef4444');

async function unifiedPaymentUpdate(pid,custId,custName,oldPaid,totalAmount){
  var newRecvd=parseFloat(document.getElementById('upd-paid-new').value||0);
  var action=document.getElementById('ph-action').value;
  var promiseNote=document.getElementById('upd-promise').value.trim();
  var promiseDate=document.getElementById('upd-promdate').value;
  var reminderDate=promiseDate; // same as promise date
  var note=document.getElementById('ph-note').value.trim();

  // Calculate new paid amount
  var newPaid=oldPaid+newRecvd;
  if(newPaid>totalAmount)newPaid=totalAmount;
  var newPending=totalAmount-newPaid;

  // Auto-paid if pending becomes 0
  var newStatus=newPending<=0?'paid':'pending';

  // Build note for history
  var histNote=note;
  if(newRecvd>0)histNote='Rs.'+newRecvd.toLocaleString()+' mila'+(note?' | '+note:'');

  // Save history entry
  if(action){
    await api({action:'addPaymentHistory',paymentId:pid,customerId:custId,customerName:custName,
      action:action,note:histNote,addedBy:currentUser.name});
  }

  // Update payment record - promise date = reminder date
  var res=await api({action:'updatePayment',id:pid,
    paidAmount:newPaid,
    reminderDate:promiseDate,
    promiseNote:promiseNote,
    promiseDate:promiseDate,
    status:newStatus
  });

  if(res.success){
    if(newStatus==='paid')toast(custName+' ka payment complete ho gaya!','#22c55e');
    else if(newRecvd>0)toast('Rs.'+newRecvd.toLocaleString()+' update ho gaya!');
    else toast('Update ho gaya!');
    closeModal();
    invalidateCache('payments');
    loadPayments(true);
  } else toast('Error: '+res.error,'#ef4444');
}

function refreshPage(page){
  invalidateCache(page);
  if(page==='complaints')loadComplaints(true);
  else if(page==='payments')loadPayments(true);
  else if(page==='machines')loadMachines(true);
  else if(page==='customers')loadCustomers(true);
  else if(page==='employees')loadEmployees(true);
  toast('Refresh ho raha hai...','#2563eb');
}

window.onload=function(){var saved=localStorage.getItem('saaz_user');if(saved){currentUser=JSON.parse(saved);startApp();}};
